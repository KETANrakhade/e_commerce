<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Review Submission</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #5568d3;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Test Review Submission</h1>
    
    <div class="form-group">
        <label>Product ID:</label>
        <input type="text" id="productId" placeholder="Enter product ID">
        <small>Get this from the product URL or database</small>
    </div>
    
    <div class="form-group">
        <label>Rating:</label>
        <select id="rating">
            <option value="5">5 Stars</option>
            <option value="4">4 Stars</option>
            <option value="3">3 Stars</option>
            <option value="2">2 Stars</option>
            <option value="1">1 Star</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>Comment:</label>
        <textarea id="comment" rows="4" placeholder="Write your review..."></textarea>
    </div>
    
    <button onclick="submitReview()">Submit Review</button>
    
    <div id="result" class="result"></div>
    
    <script src="api-config.js"></script>
    <script>
        async function submitReview() {
            const productId = document.getElementById('productId').value.trim();
            const rating = parseInt(document.getElementById('rating').value);
            const comment = document.getElementById('comment').value.trim();
            const resultDiv = document.getElementById('result');
            
            // Validation
            if (!productId) {
                showResult('error', 'Please enter a product ID');
                return;
            }
            
            if (!comment) {
                showResult('error', 'Please enter a comment');
                return;
            }
            
            // Get token
            const token = localStorage.getItem('token');
            if (!token) {
                showResult('error', 'No token found. Please login first.');
                return;
            }
            
            try {
                console.log('Submitting review:', { productId, rating, comment });
                
                const response = await fetch(`${window.API_BASE_URL}/reviews/${productId}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ rating, comment })
                });
                
                console.log('Response status:', response.status);
                
                const data = await response.json();
                console.log('Response data:', data);
                
                if (response.ok) {
                    showResult('success', 'Review submitted successfully!', data);
                } else {
                    showResult('error', data.message || 'Failed to submit review', data);
                }
                
            } catch (error) {
                console.error('Error:', error);
                showResult('error', error.message);
            }
        }
        
        function showResult(type, message, data = null) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result ${type}`;
            resultDiv.style.display = 'block';
            
            let html = `<strong>${message}</strong>`;
            if (data) {
                html += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            }
            
            resultDiv.innerHTML = html;
        }
        
        // Check if user is logged in
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            if (!token) {
                showResult('error', 'You are not logged in. Please login first.');
            } else {
                showResult('success', `Logged in as: ${user.name || user.email || 'User'}`);
            }
        });
    </script>
</body>
</html>
