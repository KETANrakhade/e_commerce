<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Review Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        .log {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #667eea;
            padding-left: 10px;
        }
        .error {
            border-left-color: #e74c3c;
            color: #e74c3c;
        }
        .success {
            border-left-color: #27ae60;
            color: #27ae60;
        }
    </style>
</head>
<body>
    <h1>Review Submission Test</h1>
    
    <div>
        <h3>Step 1: Check Login Status</h3>
        <button onclick="checkLogin()">Check Login</button>
    </div>
    
    <div>
        <h3>Step 2: Get First Product ID</h3>
        <button onclick="getFirstProduct()">Get Product</button>
    </div>
    
    <div>
        <h3>Step 3: Submit Test Review</h3>
        <button onclick="submitTestReview()">Submit Review</button>
    </div>
    
    <div>
        <h3>Step 4: Check My Orders</h3>
        <button onclick="checkOrders()">Get Orders</button>
    </div>
    
    <div class="log" id="log"></div>
    
    <script src="api-config.js"></script>
    <script>
        let testProductId = null;
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }
        
        async function checkLogin() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            if (!token) {
                log('❌ Not logged in', 'error');
                log('Please login first at login.html', 'error');
                return;
            }
            
            log(`✅ Logged in as: ${user.name || user.email}`, 'success');
            log(`Token: ${token.substring(0, 20)}...`, 'info');
        }
        
        async function getFirstProduct() {
            try {
                log('🔍 Fetching products...');
                const response = await fetch(`${window.API_BASE_URL}/products?limit=1`);
                const data = await response.json();
                
                if (data.success && data.data && data.data.products && data.data.products.length > 0) {
                    testProductId = data.data.products[0]._id;
                    log(`✅ Got product: ${data.data.products[0].name}`, 'success');
                    log(`Product ID: ${testProductId}`, 'success');
                } else {
                    log('❌ No products found', 'error');
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }
        
        async function submitTestReview() {
            if (!testProductId) {
                log('❌ No product ID. Run "Get Product" first', 'error');
                return;
            }
            
            const token = localStorage.getItem('token');
            if (!token) {
                log('❌ Not logged in', 'error');
                return;
            }
            
            try {
                log('📝 Submitting review...');
                log(`URL: ${window.API_BASE_URL}/reviews/${testProductId}`);
                log(`Rating: 5, Comment: "Test review"`);
                
                const response = await fetch(`${window.API_BASE_URL}/reviews/${testProductId}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        rating: 5,
                        comment: 'This is a test review from the test page'
                    })
                });
                
                log(`Response status: ${response.status}`);
                
                const data = await response.json();
                log(`Response: ${JSON.stringify(data, null, 2)}`);
                
                if (response.ok) {
                    log('✅ Review submitted successfully!', 'success');
                } else {
                    log(`❌ Failed: ${data.message || 'Unknown error'}`, 'error');
                }
                
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
                log(`Stack: ${error.stack}`, 'error');
            }
        }
        
        async function checkOrders() {
            const token = localStorage.getItem('token');
            if (!token) {
                log('❌ Not logged in', 'error');
                return;
            }
            
            try {
                log('📦 Fetching orders...');
                const response = await fetch(`${window.API_BASE_URL}/orders/myorders`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                log(`Response: ${JSON.stringify(data, null, 2)}`);
                
                if (data.success && data.data) {
                    log(`✅ Found ${data.data.length} orders`, 'success');
                    data.data.forEach((order, i) => {
                        log(`Order ${i + 1}: ${order.orderNumber} - ${order.status}`);
                        order.orderItems.forEach(item => {
                            log(`  - ${item.name} (ID: ${item.productId || item.product || 'N/A'})`);
                        });
                    });
                } else {
                    log('❌ No orders found', 'error');
                }
                
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }
        
        // Auto-check login on load
        window.addEventListener('DOMContentLoaded', checkLogin);
    </script>
</body>
</html>
