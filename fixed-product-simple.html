<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fixed Product Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <script src="config.js"></script>
    <style>
        .product-images img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .color-variant-swatch {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            border: 3px solid #e1e5e9;
            cursor: pointer;
            margin: 5px;
            background-size: cover;
            background-position: center;
        }
        .color-variant-swatch.active {
            border-color: #65AAC3;
        }
        .debug-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            background: white;
            border: 1px solid #ccc;
            padding: 10px;
            max-width: 300px;
            font-size: 12px;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="debug-panel" id="debugPanel">
        <h6>Debug Info:</h6>
        <div id="debugContent">Starting...</div>
    </div>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-6">
                <div class="product-images" id="productImages">
                    <p>Loading images...</p>
                </div>
            </div>
            <div class="col-md-6">
                <h2 id="productName">Loading Product...</h2>
                <div class="d-flex align-items-center mt-3">
                    <span class="fs-3 fw-bold text-success" id="productPrice">Rs. 0</span>
                    <span class="text-muted text-decoration-line-through ms-3" id="productMrp" style="display: none;"></span>
                    <span class="badge bg-danger ms-2" id="productDiscount" style="display: none;"></span>
                </div>
                
                <div id="colorVariantsSection" style="display: none;">
                    <h6 class="mt-4">SELECT COLOR</h6>
                    <div class="d-flex flex-wrap" id="colorVariantsContainer">
                        <!-- Color swatches will be populated here -->
                    </div>
                    <small class="text-muted" id="selectedColorInfo">Selected: <span id="selectedColorName">-</span></small>
                </div>
                
                <h6 class="mt-4">SELECT SIZE</h6>
                <div class="size-options">
                    <button class="btn btn-outline-secondary me-2">39</button>
                    <button class="btn btn-outline-secondary me-2">40</button>
                    <button class="btn btn-outline-secondary me-2">42</button>
                    <button class="btn btn-outline-secondary me-2">44</button>
                </div>
                
                <div class="mt-4">
                    <button class="btn btn-primary btn-lg me-3" id="addToBagBtn">
                        <i class="bi bi-bag-fill"></i> ADD TO BAG
                    </button>
                    <button class="btn btn-outline-primary btn-lg" id="wishlistBtn">
                        <i class="bi bi-heart"></i> WISHLIST
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentProduct = null;
        let selectedColorVariant = null;

        function debugLog(message) {
            const debugContent = document.getElementById('debugContent');
            debugContent.innerHTML += '<p>' + message + '</p>';
            console.log(message);
        }

        async function loadProduct() {
            try {
                debugLog('🚀 Starting product load...');
                
                // Check CONFIG
                if (typeof CONFIG === 'undefined') {
                    debugLog('❌ CONFIG is undefined!');
                    return;
                }
                debugLog('✅ CONFIG loaded: ' + CONFIG.API_BASE_URL);
                
                // Get product ID from URL or use default
                const urlParams = new URLSearchParams(window.location.search);
                let productId = urlParams.get('id') || '697349c4988fce88e4b5bb91';
                debugLog('🔍 Product ID: ' + productId);
                
                const url = `${CONFIG.API_BASE_URL}/products/${productId}`;
                debugLog('📡 Fetching: ' + url);
                
                const response = await fetch(url);
                debugLog('📡 Response status: ' + response.status);
                
                if (response.ok) {
                    const data = await response.json();
                    debugLog('✅ Data received');
                    
                    if (data.success && data.data) {
                        currentProduct = data.data;
                        debugLog('✅ Product: ' + currentProduct.name);
                        displayProduct(currentProduct);
                    } else {
                        debugLog('❌ Invalid data structure');
                    }
                } else {
                    debugLog('❌ API Error: ' + response.status);
                    // Try to get first product from list
                    await loadFirstProduct();
                }
            } catch (error) {
                debugLog('❌ Exception: ' + error.message);
                await loadFirstProduct();
            }
        }

        async function loadFirstProduct() {
            try {
                debugLog('🔄 Loading first product as fallback...');
                const response = await fetch(`${CONFIG.API_BASE_URL}/products`);
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.success && data.data && data.data.products && data.data.products.length > 0) {
                        currentProduct = data.data.products[0];
                        debugLog('✅ Using first product: ' + currentProduct.name);
                        displayProduct(currentProduct);
                    }
                }
            } catch (error) {
                debugLog('❌ Fallback failed: ' + error.message);
            }
        }

        function displayProduct(product) {
            debugLog('🎨 Displaying product: ' + product.name);
            
            // Update basic info
            document.getElementById('productName').textContent = product.name;
            
            // Handle pricing with discount
            let displayPrice = product.price;
            let originalPrice = product.price;
            
            if (product.discount && product.discount.isOnSale && product.discount.salePrice) {
                displayPrice = product.discount.salePrice;
                originalPrice = product.price;
                
                document.getElementById('productPrice').textContent = 'Rs. ' + displayPrice.toLocaleString();
                document.getElementById('productMrp').textContent = 'Rs. ' + originalPrice.toLocaleString();
                document.getElementById('productMrp').style.display = 'inline';
                document.getElementById('productDiscount').textContent = product.discount.percentage + '% OFF';
                document.getElementById('productDiscount').style.display = 'inline';
                
                debugLog('💰 Discount applied: Rs. ' + originalPrice + ' → Rs. ' + displayPrice);
            } else {
                document.getElementById('productPrice').textContent = 'Rs. ' + displayPrice.toLocaleString();
                debugLog('💰 Regular price: Rs. ' + displayPrice);
            }
            
            // Handle color variants
            if (product.hasColorVariants && product.colorVariants && product.colorVariants.length > 0) {
                debugLog('🎨 Setting up ' + product.colorVariants.length + ' color variants');
                document.getElementById('colorVariantsSection').style.display = 'block';
                setupColorVariants(product);
                
                // Select default variant
                const defaultVariant = product.colorVariants.find(v => v.isDefault) || product.colorVariants[0];
                selectColorVariant(defaultVariant);
            } else {
                debugLog('📦 No color variants, showing base images');
                displayImages(product);
            }
        }

        function setupColorVariants(product) {
            const container = document.getElementById('colorVariantsContainer');
            container.innerHTML = '';
            
            product.colorVariants.forEach(variant => {
                const swatch = document.createElement('div');
                swatch.className = 'color-variant-swatch';
                swatch.setAttribute('data-variant-id', variant._id);
                swatch.setAttribute('title', variant.colorName);
                
                if (variant.thumbnailImage) {
                    swatch.style.backgroundImage = `url(${variant.thumbnailImage})`;
                } else {
                    swatch.style.backgroundColor = variant.colorCode || '#ccc';
                }
                
                swatch.addEventListener('click', () => selectColorVariant(variant));
                container.appendChild(swatch);
            });
        }

        function selectColorVariant(variant) {
            selectedColorVariant = variant;
            debugLog('🎨 Selected variant: ' + variant.colorName);
            
            // Update active swatch
            document.querySelectorAll('.color-variant-swatch').forEach(swatch => {
                swatch.classList.remove('active');
            });
            document.querySelector(`[data-variant-id="${variant._id}"]`).classList.add('active');
            
            // Update selected color info
            document.getElementById('selectedColorName').textContent = variant.colorName;
            
            // Update price if variant has different price
            if (variant.finalPrice && variant.finalPrice !== currentProduct.price) {
                document.getElementById('productPrice').textContent = 'Rs. ' + variant.finalPrice.toLocaleString();
                debugLog('💰 Variant price: Rs. ' + variant.finalPrice);
            }
            
            // Display variant images
            displayImages(currentProduct, variant);
        }

        function displayImages(product, variant = null) {
            const container = document.getElementById('productImages');
            container.innerHTML = '';
            
            let imagesToShow = [];
            
            if (variant && variant.images && variant.images.length > 0) {
                imagesToShow = variant.images;
                debugLog('🖼️ Showing ' + imagesToShow.length + ' variant images');
            } else if (product.images && product.images.length > 0) {
                imagesToShow = product.images;
                debugLog('🖼️ Showing ' + imagesToShow.length + ' product images');
            }
            
            if (imagesToShow.length > 0) {
                imagesToShow.slice(0, 4).forEach(image => {
                    const img = document.createElement('img');
                    img.src = image.url || image;
                    img.alt = product.name;
                    img.className = 'img-fluid';
                    container.appendChild(img);
                });
            } else {
                container.innerHTML = '<p class="text-muted">No images available</p>';
                debugLog('⚠️ No images found');
            }
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function() {
            debugLog('🚀 DOM loaded, starting...');
            loadProduct();
        });
    </script>
</body>
</html>
