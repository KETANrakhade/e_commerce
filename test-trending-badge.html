<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Trending Badge</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .product-card {
            width: 280px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin: 20px;
        }
        .product-image-container {
            position: relative;
            height: 350px;
            background: #ddd;
        }
        .sale-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #e74c3c;
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            font-size: 0.9rem;
            font-weight: 700;
            z-index: 10;
        }
        .trending-badge {
            position: absolute;
            top: 60px;
            left: 15px;
            background: linear-gradient(135deg, #FF6B35, #F7931E);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
            animation: trendingPulse 2s ease-in-out infinite;
        }
        @keyframes trendingPulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 6px 20px rgba(255, 107, 53, 0.6);
            }
        }
        .product-info {
            padding: 20px;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>Trending Badge Test</h1>
    
    <div class="product-card">
        <div class="product-image-container">
            <div class="sale-badge">Sale</div>
            <div class="trending-badge">🔥 Trending</div>
        </div>
        <div class="product-info">
            <h3>Test Product</h3>
            <p>This should show both Sale and Trending badges</p>
        </div>
    </div>

    <div id="result">
        <h2>API Test Results:</h2>
        <div id="products"></div>
    </div>

    <script>
        // Test API call
        fetch('http://localhost:5001/api/products/category/men')
            .then(res => res.json())
            .then(data => {
                const productsDiv = document.getElementById('products');
                const trendingProducts = data.data.products.filter(p => p.trending);
                
                productsDiv.innerHTML = `
                    <p><strong>Total products:</strong> ${data.data.products.length}</p>
                    <p><strong>Trending products:</strong> ${trendingProducts.length}</p>
                    <h3>Trending Products:</h3>
                    <ul>
                        ${trendingProducts.map(p => `<li>${p.name} - trending: ${p.trending}</li>`).join('')}
                    </ul>
                `;
            })
            .catch(err => {
                document.getElementById('products').innerHTML = `<p style="color: red;">Error: ${err.message}</p>`;
            });
    </script>
</body>
</html>
