<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoom Test</title>
  <style>
    body {
      margin: 50px;
      font-family: Arial, sans-serif;
    }
    
    .zoom-container {
      position: relative;
      width: 500px;
      height: 500px;
      cursor: crosshair;
      border: 2px solid #ccc;
      display: inline-block;
    }
    
    .zoom-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .zoom-lens {
      position: absolute;
      border: 3px solid white;
      width: 150px;
      height: 150px;
      pointer-events: none;
      opacity: 0;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.3);
      z-index: 10;
      transition: opacity 0.2s;
    }
    
    .zoom-result {
      position: fixed;
      right: 50px;
      top: 50px;
      width: 400px;
      height: 400px;
      border: 2px solid #333;
      background: white;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      z-index: 9999;
      transition: opacity 0.2s;
    }
    
    .zoom-result img {
      position: absolute;
      max-width: none;
    }
    
    .zoom-container.zooming .zoom-lens {
      opacity: 1;
    }
    
    .zoom-container.zooming .zoom-result {
      opacity: 1;
    }
    
    .info {
      margin-top: 20px;
      padding: 15px;
      background: #f0f0f0;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h1>Amazon-Style Zoom Test</h1>
  <p>Hover over the image to see the zoom effect</p>
  
  <div class="zoom-container" id="testContainer">
    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800" alt="Test Product" class="zoom-image">
    <div class="zoom-lens"></div>
    <div class="zoom-result">
      <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800" alt="Test Product">
    </div>
  </div>
  
  <div class="info">
    <h3>Console Output:</h3>
    <div id="console"></div>
  </div>

  <script>
    const logDiv = document.getElementById('console');
    function log(msg) {
      console.log(msg);
      logDiv.innerHTML += msg + '<br>';
    }
    
    log('🔍 Starting zoom initialization...');
    
    const container = document.querySelector('.zoom-container');
    const img = container.querySelector('.zoom-image');
    const lens = container.querySelector('.zoom-lens');
    const result = container.querySelector('.zoom-result');
    const resultImg = result.querySelector('img');
    
    log('✅ Elements found');
    
    img.onload = function() {
      log('✅ Image loaded: ' + img.naturalWidth + 'x' + img.naturalHeight);
      
      const zoomLevel = 2;
      resultImg.style.width = (img.naturalWidth * zoomLevel) + 'px';
      resultImg.style.height = (img.naturalHeight * zoomLevel) + 'px';
      
      log('✅ Zoom setup complete');
    };
    
    container.addEventListener('mouseenter', () => {
      log('🖱️ Mouse entered');
      container.classList.add('zooming');
    });
    
    container.addEventListener('mouseleave', () => {
      log('🖱️ Mouse left');
      container.classList.remove('zooming');
    });
    
    container.addEventListener('mousemove', (e) => {
      const rect = img.getBoundingClientRect();
      let x = e.clientX - rect.left;
      let y = e.clientY - rect.top;
      
      let lensX = x - (lens.offsetWidth / 2);
      let lensY = y - (lens.offsetHeight / 2);
      
      lensX = Math.max(0, Math.min(lensX, rect.width - lens.offsetWidth));
      lensY = Math.max(0, Math.min(lensY, rect.height - lens.offsetHeight));
      
      lens.style.left = lensX + 'px';
      lens.style.top = lensY + 'px';
      
      const cx = result.offsetWidth / lens.offsetWidth;
      const cy = result.offsetHeight / lens.offsetHeight;
      
      resultImg.style.left = '-' + (lensX * cx) + 'px';
      resultImg.style.top = '-' + (lensY * cy) + 'px';
    });
    
    log('✅ Event listeners attached');
  </script>
</body>
</html>
